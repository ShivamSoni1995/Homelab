name: CI and GitOps Delivery

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'gitops-safe1/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'gitops-safe1/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME_BACKEND: shivamsoni1995/humor-game-backend
  IMAGE_NAME_FRONTEND: shivamsoni1995/humor-game-frontend

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_changed: ${{ steps.filter.outputs.app }}
      gitops_changed: ${{ steps.filter.outputs.gitops }}
      workflow_changed: ${{ steps.filter.outputs.workflow }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'backend/**'
              - 'frontend/**'
            gitops:
              - 'gitops-safe1/**'
            workflow:
              - '.github/workflows/ci.yml'

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm run test:ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate GitOps manifests
        run: kubectl kustomize gitops-safe1/overlays/dev > /tmp/gitops-safe1-rendered.yaml

      - name: Build backend image
        run: docker build -t local/backend-ci:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t local/frontend-ci:${{ github.sha }} ./frontend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [detect-changes, validate, security-scan]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'github-actions[bot]' &&
      needs.detect-changes.outputs.app_changed == 'true'
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: image-tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_NAME_BACKEND }}:${{ steps.image-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_NAME_FRONTEND }}:${{ steps.image-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published images
        run: |
          echo "## Published images" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: ${{ env.IMAGE_NAME_BACKEND }}:${{ steps.image-tag.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: ${{ env.IMAGE_NAME_FRONTEND }}:${{ steps.image-tag.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"

  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'github-actions[bot]' &&
      needs.detect-changes.outputs.app_changed == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup yq
        uses: mikefarah/yq@v4.44.3

      - name: Update image tags in gitops-safe1
        run: |
          yq eval '.spec.template.spec.containers[0].image = "${{ env.IMAGE_NAME_BACKEND }}:${{ needs.build-and-push.outputs.image_tag }}"' -i gitops-safe1/base/backend.yaml
          yq eval '.spec.template.spec.containers[0].imagePullPolicy = "Always"' -i gitops-safe1/base/backend.yaml
          yq eval '.spec.template.spec.containers[0].image = "${{ env.IMAGE_NAME_FRONTEND }}:${{ needs.build-and-push.outputs.image_tag }}"' -i gitops-safe1/base/frontend.yaml
          yq eval '.spec.template.spec.containers[0].imagePullPolicy = "Always"' -i gitops-safe1/base/frontend.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops-safe1/base/backend.yaml gitops-safe1/base/frontend.yaml
          git diff --staged --quiet || git commit -m "ci: update GitOps image tags to ${{ needs.build-and-push.outputs.image_tag }}"
          git push

  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, validate, security-scan, build-and-push, update-gitops]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Create workflow summary
        run: |
          echo "## CI summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- App changed: ${{ needs.detect-changes.outputs.app_changed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitOps changed: ${{ needs.detect-changes.outputs.gitops_changed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Validate: ${{ needs.validate.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Security scan: ${{ needs.security-scan.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build and push: ${{ needs.build-and-push.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Update GitOps: ${{ needs.update-gitops.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "GitOps source path: \`gitops-safe1/overlays/dev\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Frontend manifest: \`gitops-safe1/base/frontend.yaml\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Backend manifest: \`gitops-safe1/base/backend.yaml\`" >> "$GITHUB_STEP_SUMMARY"